<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        
        .drive-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }
        
        .drive-logo svg {
            width: 100%;
            height: 100%;
        }
        
        h2 {
            color: #333;
            margin-bottom: 1rem;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4285f4;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        
        .redirect-btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .redirect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(66,133,244,0.4);
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .auto-redirect {
            color: #666;
            font-size: 14px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="drive-logo">
            <svg viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
                <path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
                <path d="M43.65 25l13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-27.5c-1.6 0-3.15.45-4.5 1.2l13.75 23.8h9z" fill="#00ac47"/>
                <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.5l13.75 23.8z" fill="#ea4335"/>
                <path d="M43.65 53l-13.75-23.8-13.75 23.8 13.75 23.8 13.75-23.8z" fill="#4285f4"/>
                <path d="M59.4 53l-13.75-23.8h-27.5l27.5 47.6 13.75-23.8z" fill="#ffba00"/>
                <path d="M73.4 26.85l-13.75-23.8-27.5 47.6h27.5l13.75-23.8z" fill="#ffba00"/>
            </svg>
        </div>
        
        <h2>Google Drive / HUB</h2>
        <p>Taking you to Zi Jun central hub...</p>
        
        <div class="loader"></div>
        
        <a href="YOUR_HUB_URL_HERE" class="redirect-btn">Go to Hub Now</a>
        <p class="auto-redirect">Auto-redirect in <span id="countdown">5</span> seconds</p>
    </div>

    <script>
        // Replace with your actual hub URL
        const HUB_URL = "https://pacguy-mtk.github.io/";
        
        // Auto redirect countdown
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = HUB_URL;
            }
        }, 1000);
        
        // Manual redirect
        document.querySelector('.redirect-btn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = HUB_URL;
        });
    </script>
</body>
</html>
